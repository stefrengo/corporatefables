<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- shared shield outline, reused as a <path> string inside every symbol -->
  <defs>
    <path id="shield-outline" d="M50 3 L91 15 V58 C91 91 71 108 50 116 C29 108 9 91 9 58 V15 Z"/>
  </defs>

  <!-- BRAND MARK: quill crossed with a leaf, used in nav/footer -->
  <symbol id="crest-brand" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <path d="M35 82 L70 32" />
    <path d="M70 32 C 76 30 80 26 80 20 C 73 20 68 24 66 30 C 64 36 66 40 70 40 C 74 40 76 36 70 32 Z"/>
    <path d="M35 82 L30 92" />
    <path d="M42 60 C 34 60 28 66 28 74 C 36 74 42 68 42 60 Z" />
  </symbol>

  <!-- 1. TALPA (mole) — Duna, snout low, eyes shut -->
  <symbol id="crest-mole" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <ellipse cx="50" cy="62" rx="26" ry="19"/>
    <path d="M27 58 C 20 56 15 58 12 63" />
    <path d="M32 46 C 30 40 33 35 39 34" />
    <path d="M40 65 h6 M54 65 h6" />
    <path d="M38 78 l-4 6 M46 80 l-2 7 M56 80 l2 7 M64 78 l4 6" />
  </symbol>

  <!-- 2. POLPO (octopus) — Otto, round head + eight curling lines -->
  <symbol id="crest-octopus" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <circle cx="50" cy="46" r="18"/>
    <circle cx="44" cy="43" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="56" cy="43" r="1.6" fill="currentColor" stroke="none"/>
    <path d="M34 58 C 28 66 30 74 24 80"/>
    <path d="M40 62 C 36 72 40 78 34 86"/>
    <path d="M48 64 C 46 74 50 80 46 90"/>
    <path d="M56 64 C 58 74 54 80 58 90"/>
    <path d="M64 62 C 68 72 64 78 70 86"/>
    <path d="M70 58 C 76 66 74 74 80 80"/>
  </symbol>

  <!-- 3. TAPIRO (tapir) — Teo, elongated snout/proboscis -->
  <symbol id="crest-tapir" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <ellipse cx="53" cy="58" rx="24" ry="18"/>
    <path d="M31 60 C 22 60 16 66 15 76 C 14 84 18 88 24 86"/>
    <path d="M62 44 C 66 38 74 38 76 44"/>
    <circle cx="48" cy="54" r="1.6" fill="currentColor" stroke="none"/>
    <path d="M46 72 h8" />
  </symbol>

  <!-- 4. LUMACA (snail) — Lena, spiral shell + stalk eyes -->
  <symbol id="crest-snail" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <path d="M56 46 m-14 0 a14 14 0 1 1 28 0 a10 10 0 1 1 -20 0 a6 6 0 1 1 12 0 a3 3 0 1 1 -6 0"/>
    <path d="M28 70 C 22 70 18 74 18 79 C 18 84 22 88 28 88 C 44 88 50 78 66 78"/>
    <path d="M28 68 C 24 62 22 56 24 50" />
    <path d="M34 68 C 32 60 34 54 38 50" />
    <circle cx="24" cy="49" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="38" cy="49" r="1.6" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- 5. SCIMMIA (monkey) — Ada, round ears + open book below -->
  <symbol id="crest-monkey" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <circle cx="50" cy="46" r="17"/>
    <circle cx="30" cy="42" r="8"/>
    <circle cx="70" cy="42" r="8"/>
    <circle cx="44" cy="45" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="56" cy="45" r="1.6" fill="currentColor" stroke="none"/>
    <path d="M44 53 C 47 56 53 56 56 53"/>
    <path d="M28 78 h44 v14 c-10 -4 -34 -4 -44 0 Z"/>
    <path d="M50 78 v14"/>
  </symbol>

  <!-- 6. PICCIONE (pigeon) — Bernie, bird in flight -->
  <symbol id="crest-pigeon" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <ellipse cx="54" cy="58" rx="14" ry="10"/>
    <path d="M40 54 C 30 48 20 48 14 54 C 24 56 32 58 40 60"/>
    <path d="M64 58 C 76 56 84 60 88 66 C 78 64 70 64 63 64"/>
    <path d="M64 52 C 70 44 76 42 80 44 C 76 48 71 51 66 54"/>
    <circle cx="60" cy="54" r="1.5" fill="currentColor" stroke="none"/>
    <path d="M66 53 l6 -2"/>
  </symbol>

  <!-- 7. MULO (mule) — Aldo, long ears profile -->
  <symbol id="crest-mule" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <path d="M32 70 C 30 54 38 40 54 38 C 66 37 72 46 70 56 C 78 56 82 62 78 68 C 74 73 66 72 62 68 L 56 74 L 40 74 Z"/>
    <path d="M46 38 C 44 28 40 22 34 20" />
    <path d="M56 37 C 56 27 60 21 66 18" />
    <circle cx="58" cy="52" r="1.6" fill="currentColor" stroke="none"/>
    <path d="M40 70 v10 M50 72 v10" />
  </symbol>

  <!-- 8. PROCIONE (raccoon) — Renoir, mask band across eyes -->
  <symbol id="crest-raccoon" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <circle cx="50" cy="54" r="20"/>
    <path d="M28 44 l6 -12 M72 44 l-6 -12" />
    <path d="M32 48 C 38 44 62 44 68 48 C 66 56 60 58 50 58 C 40 58 34 56 32 48 Z" fill="currentColor" opacity=".18" stroke="none"/>
    <path d="M32 48 C 38 44 62 44 68 48 C 66 56 60 58 50 58 C 40 58 34 56 32 48 Z"/>
    <circle cx="42" cy="50" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="58" cy="50" r="1.6" fill="currentColor" stroke="none"/>
  </symbol>

  <!-- 9. AQUILA (eagle) — Kael, wings fully spread, heraldic -->
  <symbol id="crest-eagle" viewBox="0 0 100 120" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <use href="#shield-outline"/>
    <circle cx="50" cy="40" r="9"/>
    <path d="M50 40 l3 6 -3 3 -3 -3 Z" fill="currentColor" stroke="none"/>
    <path d="M42 48 C 30 46 18 50 10 58 C 20 58 28 58 38 62"/>
    <path d="M38 62 C 26 64 16 70 12 78 C 22 76 30 74 42 72"/>
    <path d="M58 48 C 70 46 82 50 90 58 C 80 58 72 58 62 62"/>
    <path d="M62 62 C 74 64 84 70 88 78 C 78 76 70 74 58 72"/>
    <path d="M46 70 h8 l-4 12 Z" fill="currentColor" stroke="none"/>
  </symbol>

</svg>
