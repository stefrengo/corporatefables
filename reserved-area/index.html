<style>
  :root{
    --ink:#1B2A3A;
    --parchment:#EDE4D3;
    --parchment-dark:#E1D5BC;
    --brass:#A9832E;
    --brass-light:#C9A24E;
    --forest:#2F4538;
    --charcoal:#3A342B;
    --wax:#7A2E2E;
    --paper-line: rgba(58,52,43,0.12);
    --font-display: "Big Caslon","Didot","Iowan Old Style",Georgia,serif;
    --font-body: "Avenir Next","Century Gothic",Futura,Calibri,sans-serif;
  }
  *{box-sizing:border-box;}
  .cf-root{
    font-family:var(--font-body);
    color:var(--charcoal);
    background:
      radial-gradient(ellipse at top left, rgba(169,131,46,0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(47,69,56,0.12), transparent 55%),
      var(--parchment);
    min-height:100%;
    padding:32px 16px 48px;
    position:relative;
  }
  .cf-wrap{ max-width:640px; margin:0 auto; position:relative; }
  .cf-masthead{ text-align:center; margin-bottom:24px; }
  .cf-logo{ width:64px; height:64px; border-radius:50%; display:block; margin:0 auto 14px; box-shadow:0 0 0 1px rgba(169,131,46,0.35); }

  .cf-tabbar{ display:flex; justify-content:center; gap:4px; margin:22px 0 6px; border-bottom:1px solid var(--paper-line); }
  .cf-tab{
    font-family:var(--font-body); font-size:12px; font-weight:600; letter-spacing:0.04em;
    padding:10px 16px; cursor:pointer; color:var(--charcoal); opacity:0.55;
    border-bottom:2px solid transparent; transition:opacity .15s, border-color .15s; background:none; border-top:none; border-left:none; border-right:none;
  }
  .cf-tab:hover{ opacity:0.85; }
  .cf-tab.active{ opacity:1; color:var(--ink); border-bottom-color:var(--brass); }

  .cf-eyebrow{
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--forest); font-weight:700; margin-bottom:6px;
  }
  .cf-badge-free{
    display:inline-block; margin-left:8px; padding:2px 8px; border-radius:20px;
    background:var(--brass-light); color:var(--ink); font-size:10px; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase; vertical-align:middle;
  }
  .cf-title{ font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--ink); margin:0 0 6px; }
  .cf-sub{ font-size:14px; opacity:0.75; max-width:460px; margin:0 auto; line-height:1.5; }

  .cf-corridor{ display:flex; justify-content:center; gap:5px; margin:24px 0 20px; flex-wrap:wrap; }
  .cf-door{ width:16px; height:22px; border-radius:8px 8px 3px 3px; border:1.5px solid var(--paper-line); background:rgba(255,255,255,0.35); transition:all .35s ease; }
  .cf-door.done{ background:var(--forest); border-color:var(--forest); }
  .cf-door.current{ background:var(--brass-light); border-color:var(--brass); box-shadow:0 0 0 3px rgba(169,131,46,0.18); }

  .cf-card{
    background:linear-gradient(180deg, #FBF7EE, var(--parchment-dark));
    border:1px solid rgba(58,52,43,0.15); border-radius:6px;
    box-shadow:0 1px 2px rgba(58,52,43,0.06), 0 12px 30px -14px rgba(27,42,58,0.35);
    padding:34px 30px; position:relative;
  }
  .cf-card::before{
    content:""; position:absolute; left:14px; right:14px; top:8px; bottom:8px;
    border:1px solid rgba(169,131,46,0.25); border-radius:3px; pointer-events:none;
  }
  .cf-qnum{ font-family:var(--font-display); font-size:13px; color:var(--brass); letter-spacing:0.08em; margin-bottom:10px; font-style:italic; }
  .cf-question{ font-family:var(--font-display); font-size:21px; line-height:1.35; color:var(--ink); margin:0 0 8px; }
  .cf-hint{ font-size:13px; opacity:0.65; margin-bottom:18px; line-height:1.5; }
  .cf-optional{ font-size:11px; opacity:0.5; letter-spacing:0.04em; margin-bottom:10px; }

  .cf-input, .cf-textarea{
    width:100%; font-family:var(--font-body); font-size:15px; padding:12px 14px;
    border:1.5px solid rgba(58,52,43,0.25); border-radius:4px; background:rgba(255,255,255,0.6);
    color:var(--ink); outline:none; transition:border-color .2s, background .2s;
  }
  .cf-input:focus, .cf-textarea:focus{ border-color:var(--brass); background:#fff; }
  .cf-textarea{ min-height:90px; resize:vertical; }

  .cf-options{ display:flex; flex-direction:column; gap:8px; }
  .cf-option{
    text-align:left; padding:13px 16px; border:1.5px solid rgba(58,52,43,0.22); border-radius:4px;
    background:rgba(255,255,255,0.45); font-size:14.5px; color:var(--charcoal); cursor:pointer; transition:all .15s ease;
  }
  .cf-option:hover{ border-color:var(--brass); background:rgba(255,255,255,0.75); }
  .cf-option.selected{ border-color:var(--forest); background:rgba(47,69,56,0.10); color:var(--forest); font-weight:600; }
  .cf-option .cf-tick{ float:right; opacity:0; color:var(--forest); }
  .cf-option.selected .cf-tick{ opacity:1; }

  .cf-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:24px; }
  .cf-btn{
    font-family:var(--font-body); font-size:12.5px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase;
    padding:11px 22px; border-radius:2px; cursor:pointer; transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .cf-btn:disabled{ opacity:0.35; cursor:not-allowed; }
  .cf-btn-primary{ background:var(--ink); color:var(--parchment); border:1px solid var(--ink); }
  .cf-btn-primary:not(:disabled):hover{ background:var(--forest); border-color:var(--forest); }
  .cf-btn-ghost{ background:transparent; color:var(--charcoal); border:1px solid transparent; opacity:0.55; text-transform:none; letter-spacing:0; font-weight:600; }
  .cf-btn-ghost:hover{ opacity:1; }

  .cf-loading{ text-align:center; padding:56px 20px; }
  .cf-seal{
    width:62px; height:62px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #9a4040, var(--wax) 70%);
    margin:0 auto 18px; display:flex; align-items:center; justify-content:center;
    color:#f2dede; font-family:var(--font-display); font-size:20px;
    animation:cf-pulse 1.6s ease-in-out infinite; box-shadow:0 6px 16px rgba(122,46,46,0.35);
  }
  @keyframes cf-pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
  .cf-loading-text{ font-family:var(--font-display); font-style:italic; font-size:15px; color:var(--forest); min-height:20px; }

  .cf-result{ animation:cf-unroll .5s ease; }
  @keyframes cf-unroll{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .cf-archetype-card{
    text-align:center; padding:22px 16px 26px; margin-bottom:22px;
    border-radius:6px; background:rgba(255,255,255,0.5); border:1px solid rgba(169,131,46,0.3);
  }
  .cf-archetype-eyebrow{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass); font-weight:700; margin-bottom:8px; }
  .cf-archetype-name{ font-family:var(--font-display); font-size:28px; color:var(--ink); margin:0 0 10px; }
  .cf-archetype-essence{ font-size:14.5px; line-height:1.6; color:var(--charcoal); max-width:420px; margin:0 auto; }

  .cf-section{ margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--paper-line); }
  .cf-section:last-child{ border-bottom:none; }
  .cf-section-label{ font-family:var(--font-display); font-style:italic; font-size:12px; color:var(--brass); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; }

  .cf-sw-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cf-strength, .cf-weakness{ padding:11px 13px; border-radius:4px; font-size:13.5px; line-height:1.5; }
  .cf-strength{ background:rgba(47,69,56,0.08); color:var(--forest); }
  .cf-weakness{ background:rgba(122,46,46,0.07); color:var(--wax); }
  .cf-strength b, .cf-weakness b{ display:block; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px; opacity:0.75; }

  .cf-verdict{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .cf-verdict-pill{ font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:5px 12px; border-radius:20px; }
  .cf-verdict-good{ background:rgba(47,69,56,0.15); color:var(--forest); }
  .cf-verdict-partial{ background:rgba(169,131,46,0.2); color:#7a5c1c; }
  .cf-verdict-bad{ background:rgba(122,46,46,0.13); color:var(--wax); }
  .cf-verdict-text{ font-size:14px; line-height:1.55; }

  .cf-ai-box{
    margin-top:10px; padding:14px 16px; border-radius:4px;
    background:rgba(27,42,58,0.05); border:1px dashed rgba(27,42,58,0.25);
    font-size:13px; line-height:1.55;
  }
  .cf-ai-box b{ color:var(--ink); }
  .cf-ai-tag{ font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--brass); font-weight:700; margin-bottom:6px; display:block; }

  .cf-upsell{ margin-top:8px; padding:22px 20px; border-radius:6px; background:var(--ink); color:#F0E9D8; text-align:center; }
  .cf-upsell-title{ font-family:var(--font-display); font-size:17px; margin-bottom:8px; }
  .cf-upsell-text{ font-size:12.5px; opacity:0.75; line-height:1.6; margin-bottom:16px; }
  .cf-upsell-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .cf-product-tile-light{
    background:rgba(255,255,255,0.5); border:1.5px solid rgba(58,52,43,0.2); border-radius:4px;
    padding:14px; font-size:13px; cursor:pointer; transition:all .15s ease;
  }
  .cf-product-tile-light:hover{ border-color:var(--brass); background:rgba(255,255,255,0.85); }
  .cf-product-tile-light.owned{ border-color:var(--forest); background:rgba(47,69,56,0.08); }
  .cf-product-status-light{ font-size:11px; opacity:0.6; margin-top:5px; }
  .cf-product-tile-light.owned .cf-product-status-light{ opacity:1; color:var(--forest); font-weight:700; }
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:4px;
    padding:12px 10px; font-size:12px; cursor:pointer; transition:all .15s ease;
  }
  .cf-product-tile:hover{ background:rgba(255,255,255,0.16); }
  .cf-product-tile.owned{ background:rgba(169,131,46,0.25); border-color:var(--brass-light); }
  .cf-product-status{ font-size:10.5px; opacity:0.7; margin-top:4px; }
  .cf-product-tile.owned .cf-product-status{ opacity:1; color:var(--brass-light); font-weight:700; }
  .cf-email-row{ display:flex; gap:8px; margin-top:6px; }
  .cf-email-input{ flex:1; padding:10px 12px; border-radius:4px; border:none; font-size:13px; }
  .cf-upsell-btn{ background:var(--brass-light); color:var(--ink); border:none; padding:10px 18px; border-radius:4px; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
  .cf-fine-print{ font-size:10.5px; opacity:0.55; margin-top:10px; line-height:1.5; }

  .cf-profile-bar{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:rgba(27,42,58,0.06); border:1px solid rgba(27,42,58,0.14);
    border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:12.5px;
  }
  .cf-profile-bar b{ color:var(--ink); }
  .cf-profile-bar-actions{ display:flex; gap:12px; }
  .cf-profile-bar-actions a{ color:var(--forest); font-weight:600; cursor:pointer; text-decoration:underline; }

  .cf-entity-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cf-entity-card{
    padding:20px 14px; text-align:center; border-radius:6px; cursor:pointer;
    border:1.5px solid rgba(58,52,43,0.22); background:rgba(255,255,255,0.45); transition:all .15s ease;
  }
  .cf-entity-card:hover{ border-color:var(--brass); background:rgba(255,255,255,0.8); transform:translateY(-1px); }
  .cf-entity-icon{ font-size:28px; margin-bottom:6px; }
  .cf-entity-label{ font-family:var(--font-display); font-size:16px; color:var(--ink); margin-bottom:6px; }
  .cf-entity-status{ font-size:11.5px; opacity:0.65; line-height:1.4; }

  .cf-restart{ background:none; border:none; font-size:12px; opacity:0.6; cursor:pointer; text-decoration:underline; }
  .cf-restart-row{ display:flex; justify-content:center; gap:18px; margin-top:16px; }


  @media (max-width:480px){
    .cf-card{ padding:26px 18px; }
    .cf-title{ font-size:24px; }
    .cf-question{ font-size:18px; }
    .cf-sw-grid, .cf-upsell-grid{ grid-template-columns:1fr; }
    .cf-email-row{ flex-direction:column; }
  }
</style>

  ];

  let QUESTIONS = QUESTIONS_COMPANY;

  // --- Configurazione EmailJS ---
  // Compila questi tre valori quando avrai creato account, servizio e template su emailjs.com.
  // Finché sono vuoti, l'invio viene solo simulato in console, senza bloccare l'esperienza.
  const EMAILJS_CONFIG = {
    serviceId: "",       // Email Services → il tuo servizio
    templateIdLead: "",  // Template per avvisare TE di un nuovo lead
    templateIdConfirm: "", // Template di conferma inviato al registrante (GDPR)
    publicKey: ""         // Account → General → Public Key
  };

  async function sendEmail(templateId, params){
    if (!EMAILJS_CONFIG.serviceId || !templateId || !EMAILJS_CONFIG.publicKey) {
      console.log("EmailJS non configurato: invio simulato.", { templateId, params });
      return false;
    }
    try {
      const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          service_id: EMAILJS_CONFIG.serviceId,
          template_id: templateId,
          user_id: EMAILJS_CONFIG.publicKey,
          template_params: params
        })
      });
      return res.ok;
    } catch (e) {
      console.error("Invio email non riuscito:", e);
      return false;
    }
  }

  const LOADING_LINES = [

  function renderWelcomeBack(profile){

  function renderIntro(){
    renderProfileBar();
    corridor.innerHTML = "";
    app.innerHTML = `<div class="cf-card">
      <div class="cf-qnum">Prima di iniziare</div>
      <h2 class="cf-question">Il tono ha un prezzo, se è quello sbagliato</h2>

  function renderCorridor(){
    renderProfileBar();
    corridor.innerHTML = "";
    QUESTIONS.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "cf-door" + (i < step ? " done" : i === step ? " current" : "");

  function isAnswered(q){
    const v = answers[q.id];
    if (!q.required) return true;
    return typeof v === "string" && v.trim().length > 0;
  }

  function renderQuestion(){
    renderCorridor();
    const q = QUESTIONS[step];
    let inner = "";
    inner += `<div class="cf-qnum">Domanda ${step+1} di ${QUESTIONS.length}</div>`;
    inner += `<h2 class="cf-question">${q.q}</h2>`;
    if (!q.required) inner += `<p class="cf-optional">Facoltativa</p>`;
    if (q.hint) inner += `<p class="cf-hint">${q.hint}</p>`;

    if (q.type === "text") {
      const val = answers[q.id] || "";
      if (q.textarea) {
        inner += `<textarea class="cf-textarea" id="cf-field" placeholder="${q.placeholder||''}">${val}</textarea>`;
      } else {
        inner += `<input class="cf-input" id="cf-field" type="text" placeholder="${q.placeholder||''}" value="${val.replace(/"/g,'&quot;')}" />`;
      }
    } else if (q.type === "select") {
      const val = answers[q.id] || "";
      inner += `<div class="cf-options" id="cf-field">`;
      q.options.forEach(opt => {
        inner += `<div class="cf-option${val===opt?' selected':''}" data-val="${opt}">${opt}<span class="cf-tick">✓</span></div>`;
      });
      inner += `</div>`;
    }

    inner += `<div class="cf-nav">
      <button class="cf-btn cf-btn-ghost" id="cf-back" ${step===0?'disabled':''}>← Indietro</button>
      <button class="cf-btn cf-btn-primary" id="cf-next">${step===QUESTIONS.length-1 ? 'Genera il mio profilo →' : 'Avanti →'}</button>
    </div>`;

    app.innerHTML = `<div class="cf-card">${inner}</div>`;
    wireEvents(q);
  }

  function wireEvents(q){
    if (q.type === "text") {
      document.getElementById("cf-field").addEventListener("input", e => { answers[q.id] = e.target.value; });
    } else if (q.type === "select") {
      document.querySelectorAll("#cf-field .cf-option").forEach(el => {
        el.addEventListener("click", () => { answers[q.id] = el.dataset.val; renderQuestion(); });
      });
    }
    document.getElementById("cf-back").addEventListener("click", () => { if (step > 0) { step--; renderQuestion(); } });
    document.getElementById("cf-next").addEventListener("click", () => {
      if (!isAnswered(q)) return;
      if (step < QUESTIONS.length - 1) { step++; renderQuestion(); }
      else { runAnalysis(); }
    });
  }

  // --- Bestiario del tono ---

  const ARCHETYPE_GRID = {

  const DIRECTNESS_FLAVOR = {

    "Dipende dal caso": "Sa quando essere diretto e quando addolcire il messaggio: non ha una regola fissa, e questo è un pregio se resta consapevole.",

  // --- Punti di forza e debolezza per asse ---

  const AXIS_SW = {
    formality: {

    },
    energy: {

      "Espansiva": { strength:"È memorabile e crea engagement immediato", weakness:"Può stancare o sembrare eccessiva nei momenti seri" }
    },
    directness: {
      "Diplomatico": { strength:"Protegge le relazioni e ammortizza i messaggi delicati", weakness:"Rischia di annacquare messaggi che dovrebbero restare chiari" },

    }

  function buildStrengthsWeaknesses(a){
    const axes = [
      { key:"formality", val:a.tone_formality },
      { key:"energy", val:a.tone_energy },
      { key:"directness", val:a.tone_directness },
      { key:"seriousness", val:a.tone_seriousness }
    ];
    const picked = axes.filter(x => AXIS_SW[x.key] && AXIS_SW[x.key][x.val]).slice(0, 2);
    if (!picked.length) {
      return [{ strength:"Il tono è bilanciato su tutti gli assi", weakness:"La sfida, con un tono così equilibrato, è restare distintivo e riconoscibile" }];
    }
    return picked.map(x => AXIS_SW[x.key][x.val]);
  }

  // --- Coerenza con l'obiettivo dichiarato ---

  function assessGoalFit(a){
    if (a.entity_type === "individuo") return assessGoalFitIndividual(a);
    return assessGoalFitCompany(a);
  }

  function assessGoalFitCompany(a){
    const f = a.tone_formality, e = a.tone_energy, d = a.tone_directness;
    let verdict = "buono", text = "";

    if (a.company_goal === "Attrarre nuovi talenti") {
      if (e === "Riservata") { verdict="bad"; text="Un tono riservato fatica a farsi notare in un mercato del lavoro competitivo: chi cerca talenti di solito ha bisogno di energia percepibile, non solo di correttezza formale."; }
      else if (f === "Istituzionale" && e === "Cordiale") { verdict="partial"; text="La base è solida, ma per attrarre attivamente potrebbe servire più energia riconoscibile: la cordialità istituzionale rassicura, non sempre convince a candidarsi."; }
      else { verdict="good"; text="Energia e vicinanza sono proprio quello che oggi fa la differenza per farsi notare da chi sta scegliendo dove candidarsi."; }
    } else if (a.company_goal === "Trattenere le persone e ridurre il turnover") {
      if (e === "Riservata") { verdict="bad"; text="Un tono poco caloroso rende più difficile costruire il senso di appartenenza che, di solito, è il primo motivo per cui le persone restano."; }
      else if (e === "Espansiva" && d === "Diplomatico") { verdict="partial"; text="Energia alta ma poca schiettezza nei momenti delicati: rischia di sembrare entusiasmo di facciata quando serve invece chiarezza vera."; }
      else { verdict="good"; text="Il calore percepito nel tono è uno dei fattori più legati al senso di appartenenza, e quindi alla permanenza delle persone."; }
    } else if (a.company_goal === "Rafforzare la coesione interna dopo un cambiamento") {
      if (d === "Diplomatico") { verdict="bad"; text="Nei momenti di cambiamento l'ambiguità è il terreno ideale per le voci di corridoio: un tono troppo diplomatico rischia di alimentarle invece di ridurle."; }
      else if (e === "Riservata") { verdict="partial"; text="La chiarezza c'è, ma un tono più caldo aiuterebbe le persone a sentirsi accompagnate, non solo informate, in un momento fragile."; }
      else { verdict="good"; text="Chiarezza e calore insieme sono esattamente ciò che serve per ricostruire fiducia dopo un cambiamento."; }
    } else if (a.company_goal === "Crescere restando coerenti") {
      if (f === "Informale" && e === "Espansiva") { verdict="partial"; text="Il tono funziona benissimo alla dimensione attuale: la domanda da farsi è se reggerà anche quando l'azienda sarà più grande e strutturata."; }
      else { verdict="good"; text="Non emergono segnali di rischio evidenti: la sfida sarà mantenere questo tono coerente man mano che l'azienda cresce, non cambiarlo."; }
    } else { // Migliorare la reputazione esterna
      if (f === "Informale" && e === "Espansiva") { verdict="partial"; text="Un tono molto informale ed espansivo può funzionare benissimo con i dipendenti, ma con interlocutori esterni istituzionali (media, partner, investitori) rischia di sembrare poco credibile."; }
      else { verdict="good"; text="Il livello di credibilità istituzionale percepita sembra coerente con un obiettivo di reputazione esterna."; }
    }
    return { verdict, text };
  }

  function assessGoalFitIndividual(a){
    const f = a.tone_formality, e = a.tone_energy, d = a.tone_directness, s = a.tone_seriousness;
    let verdict = "buono", text = "";

    if (a.company_goal === "Diventare un punto di riferimento nel tuo settore") {
      if (e === "Riservata") { verdict="bad"; text="Un tono riservato rende più difficile emergere come punto di riferimento: serve energia percepibile, non solo competenza sulla carta."; }
      else if (d === "Diplomatico") { verdict="partial"; text="L'energia c'è, ma restare sempre diplomatico rende più difficile prendere posizioni riconoscibili: chi diventa un riferimento, prima o poi, si espone."; }
      else { verdict="good"; text="Energia e chiarezza sono proprio ciò che serve per essere percepiti come un punto di riferimento, non solo come un altro profilo tra tanti."; }
    } else if (a.company_goal === "Trovare nuove opportunità professionali") {
      if (f === "Istituzionale" && e === "Riservata") { verdict="bad"; text="Un tono molto istituzionale e riservato rende più difficile farsi notare da chi valuta profili con un punto di vista proprio, non solo un curriculum."; }
      else if (e === "Riservata") { verdict="partial"; text="Il tono è corretto, ma potrebbe non bastare a farti notare in mezzo a chi comunica con più energia."; }
      else { verdict="good"; text="Il tono attuale aiuta a farti notare da chi sta valutando nuove collaborazioni, non solo a essere corretto."; }
    } else if (a.company_goal === "Costruire una community intorno ai tuoi contenuti") {
      if (e === "Riservata" && s === "Serio") { verdict="bad"; text="È difficile costruire una community con un tono così riservato e serio: la relazione nasce da qualcosa che somiglia a una conversazione, non a un comunicato."; }
      else if (e === "Riservata") { verdict="partial"; text="Il registro leggero aiuta, ma un'energia più cordiale renderebbe più facile far sentire le persone parte di qualcosa."; }
      else { verdict="good"; text="Calore ed energia sono la base di ogni community che funziona davvero, non solo che accumula follower."; }
    } else if (a.company_goal === "Sostenere il lancio di un progetto personale (libro, corso, attività)") {
      if (d === "Diplomatico") { verdict="bad"; text="Un lancio ha bisogno di un invito chiaro: un tono troppo diplomatico rischia di rendere debole proprio la call to action che dovrebbe convertire l'attenzione in azione."; }
      else if (e === "Riservata") { verdict="partial"; text="Il messaggio è chiaro, ma un lancio ha bisogno di più visibilità percepita: un tono più espansivo aiuterebbe nel momento decisivo."; }
      else { verdict="good"; text="Chiarezza ed energia sono esattamente ciò che serve per trasformare l'attenzione dei follower in azione concreta."; }
    } else { // Essere preso sul serio quando condividi idee scomode
      if (d === "Diplomatico") { verdict="bad"; text="Le idee scomode hanno bisogno di essere dette con chiarezza: un tono troppo diplomatico rischia di annacquarle fino a renderle innocue, e quindi ignorabili."; }
      else if (s === "Con un po' di ironia" && f === "Informale") { verdict="partial"; text="L'ironia aiuta a farsi leggere, ma nei momenti in cui vuoi essere preso sul serio potrebbe indebolire la percezione di autorevolezza."; }
      else { verdict="good"; text="Il tono attuale permette di dire cose scomode restando credibile, che è esattamente il punto di equilibrio più difficile da trovare."; }
    }
    return { verdict, text };
  }

  function seed(a){ return (a.company_name||"azienda"); }
  function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;} return h; }

  function buildArchetype(a){
    const grid = ARCHETYPE_GRID[a.tone_formality] || ARCHETYPE_GRID["Un misto dei due"];
    const base = grid[a.tone_energy] || grid["Cordiale"];
    const dFlavor = DIRECTNESS_FLAVOR[a.tone_directness] || "";
    const sFlavor = SERIOUSNESS_FLAVOR[a.tone_seriousness] || "";
    return {
      name: base.name,
      essence: `${base.essence} ${dFlavor} ${sFlavor}`
    };
  }

  async function runAnalysis(){
    renderCorridor();
    const priorProfile = currentEntityType === "individuo" ? individualProfile : companyProfile;
    let lineIdx = 0;
    app.innerHTML = `<div class="cf-card cf-loading">
      <div class="cf-seal">CF</div>
      <div class="cf-loading-text" id="cf-loading-text">${LOADING_LINES[0]}</div>
    </div>`;
    const lineInterval = setInterval(() => {
      lineIdx = (lineIdx+1) % LOADING_LINES.length;
      const el = document.getElementById("cf-loading-text");
      if (el) el.textContent = LOADING_LINES[lineIdx];
    }, 550);

    answers.entity_type = currentEntityType;
    const archetype = buildArchetype(answers);
    const strengthsWeaknesses = buildStrengthsWeaknesses(answers);
    const goalFit = assessGoalFit(answers);

    let aiEnrichment = null;
    const hasSample = answers.sample_text && answers.sample_text.trim().length > 10;

    // Piccola pausa per il ritmo della cera che si scalda; l'analisi di base è già pronta.
    await new Promise(r => setTimeout(r, 1200));

    if (hasSample) {
      try {
        const prompt = `Sei un esperto di comunicazione e cultura organizzativa. Un'azienda del settore "${answers.sector}" dichiara che il proprio tono ha queste caratteristiche: formalità=${answers.tone_formality}, direttezza=${answers.tone_directness}, energia=${answers.tone_energy}, serietà=${answers.tone_seriousness}. Analizza questo estratto reale di come comunicano: "${answers.sample_text.replace(/"/g,"'")}". Rispondi SOLO con un oggetto JSON valido, compatto, senza markdown, senza testo prima o dopo, con questa struttura: {"coerente": "si" | "parzialmente" | "no", "osservazione": "una frase di massimo 25 parole su cosa emerge davvero dal testo rispetto al tono dichiarato", "consiglio": "una frase di massimo 20 parole con un suggerimento pratico"}`;
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 300, messages: [{ role:"user", content: prompt }] })
        });
        const data = await response.json();
        if (!data.error) {
          const textBlocks = (data.content||[]).filter(b => b.type==="text").map(b=>b.text).join("\n");
          let clean = textBlocks.replace(/```json|```/g,"").trim();
          const fb = clean.indexOf("{"), lb = clean.lastIndexOf("}");
          if (fb > -1 && lb > fb) clean = clean.slice(fb, lb+1);
          aiEnrichment = JSON.parse(clean);
        }
      } catch (err) {
        console.error("Arricchimento AI non disponibile:", err);
        aiEnrichment = null;
      }
    }

    clearInterval(lineInterval);

    const result = {
      answers: Object.assign({}, answers, { entity_type: currentEntityType }),
      archetype, strengthsWeaknesses, goalFit, aiEnrichment, hasSample,
      savedAt: new Date().toISOString(),
      registered: !!(priorProfile && priorProfile.registered),
      registrant: (priorProfile && priorProfile.registrant) || null,
      purchases: (priorProfile && priorProfile.purchases) || {}
    };

    await saveProfile(currentEntityType, result);
    if (currentEntityType === "individuo") individualProfile = result; else companyProfile = result;
    currentProfile = result;

    if (result.registered) {
      renderResult(result);
    } else {
      renderGate(result);
    }
  }

  function renderGate(result){
    activeTab = "tono";
    renderTabBar();
    profileBar.innerHTML = "";
    corridor.innerHTML = "";
    const a = result.answers;
    app.innerHTML = `<div class="cf-card">
      <div class="cf-archetype-card">
        <div class="cf-archetype-eyebrow">Il tono di ${a.company_name || "questo profilo"} è</div>
        <h2 class="cf-archetype-name">${result.archetype.name}</h2>
      </div>
      <p class="cf-hint" style="text-align:center;font-size:14px;line-height:1.6;margin-bottom:22px;">
        Il resto è pronto: punti di forza e debolezza, coerenza con il tuo obiettivo, e l'accesso alla tua area personale.
        Registrati per vederlo, è gratuito.
      </p>
      <input class="cf-input" id="cf-gate-name" type="text" placeholder="Il tuo nome" style="margin-bottom:10px;" />
      <input class="cf-input" id="cf-gate-email" type="email" placeholder="La tua email" style="margin-bottom:6px;" />
      <p style="font-size:11px;opacity:0.6;line-height:1.5;margin:10px 0 18px;">
        Registrandoti accetti di ricevere l'analisi via email e di creare un account per la tua area personale.
        Puoi chiedere la cancellazione dei tuoi dati in qualsiasi momento.
      </p>
      <div class="cf-nav" style="justify-content:flex-end;">
        <button class="cf-btn cf-btn-primary" id="cf-gate-submit">Registrati e vedi il risultato →</button>
      </div>
      <div id="cf-gate-error" style="color:var(--wax);font-size:12px;margin-top:10px;text-align:right;"></div>
    </div>`;

    document.getElementById("cf-gate-submit").addEventListener("click", async () => {
      const name = document.getElementById("cf-gate-name").value.trim();
      const email = document.getElementById("cf-gate-email").value.trim();
      const errEl = document.getElementById("cf-gate-error");
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      if (!name || !emailOk) {
        errEl.textContent = "Inserisci nome ed email valida.";
        return;
      }
      const btn = document.getElementById("cf-gate-submit");
      btn.disabled = true; btn.textContent = "Registrazione in corso...";

      result.registered = true;
      result.registrant = { name, email, registeredAt: new Date().toISOString() };

      await saveProfile(currentEntityType, result);
      if (currentEntityType === "individuo") individualProfile = result; else companyProfile = result;
      currentProfile = result;

      await sendEmail(EMAILJS_CONFIG.templateIdLead, {
        from_name: name,
        from_email: email,
        entity_type: currentEntityType === "individuo" ? "Individuo" : "Azienda",
        subject_name: a.company_name,
        archetype: result.archetype.name,
        goal: a.company_goal,
        goal_fit: result.goalFit.verdict
      });
      await sendEmail(EMAILJS_CONFIG.templateIdConfirm, {
        to_name: name,
        to_email: email,
        subject_name: a.company_name,
        archetype: result.archetype.name
      });

      renderResult(result);
    });
  }

  const PRODUCTS = [
    { id:"onboarding", icon:"📋", name:"Kit di Benvenuto" },
    { id:"evp", icon:"🤝", name:"Kit EVP" },
    { id:"values", icon:"🧭", name:"Kit Valori" },
    { id:"pvm", icon:"🎯", name:"Kit Purpose · Vision · Mission" }
  ];

  function verdictPillClass(v){
    if (v === "good") return "cf-verdict-good";
    if (v === "partial") return "cf-verdict-partial";
    return "cf-verdict-bad";
  }
  function verdictLabel(v){
    if (v === "good") return "Allineato";
    if (v === "partial") return "Parzialmente allineato";
    return "Da rivedere";
  }

  function renderResult(r){
    activeTab = "tono";
    renderProfileBar();
    setPageHeader("Corporate Fables", "Il tono di voce", "La tua analisi salvata.");
    const a = r.answers || answers;
    let html = `<div class="cf-card cf-result">

      <div class="cf-archetype-card">
        <div class="cf-archetype-eyebrow">Il tono di ${a.company_name || "questa azienda"} è</div>
        <h2 class="cf-archetype-name">${r.archetype.name}</h2>
        <p class="cf-archetype-essence">${r.archetype.essence}</p>
      </div>

      <div class="cf-section">
        <div class="cf-section-label">Punti di forza e di debolezza</div>
        <div class="cf-sw-grid">`;
    r.strengthsWeaknesses.forEach(sw => {
      html += `<div class="cf-strength"><b>Forza</b>${sw.strength}</div>
               <div class="cf-weakness"><b>Debolezza</b>${sw.weakness}</div>`;
    });
    html += `</div></div>

      <div class="cf-section">
        <div class="cf-section-label">Coerenza con l'obiettivo dichiarato</div>
        <div class="cf-verdict">
          <span class="cf-verdict-pill ${verdictPillClass(r.goalFit.verdict)}">${verdictLabel(r.goalFit.verdict)}</span>
        </div>
        <div class="cf-verdict-text">${r.goalFit.text}</div>
    `;

    if (r.hasSample) {
      if (r.aiEnrichment) {
        html += `<div class="cf-ai-box">
          <span class="cf-ai-tag">Analisi del testo che hai incollato</span>
          <div><b>Coerente con il tono dichiarato:</b> ${r.aiEnrichment.coerente || "n/d"}</div>
          <div style="margin-top:6px;">${r.aiEnrichment.osservazione || ""}</div>
          <div style="margin-top:6px;font-style:italic;">${r.aiEnrichment.consiglio || ""}</div>
        </div>`;
      } else {
        html += `<div class="cf-ai-box">
          <span class="cf-ai-tag">Analisi del testo</span>
          L'arricchimento basato sul testo che hai incollato non è disponibile in questo momento: qui sopra trovi comunque l'analisi completa basata sul profilo che hai dichiarato.
        </div>`;
      }
    }

    const savedLabel = r.savedAt ? new Date(r.savedAt).toLocaleDateString("it-IT", { day:"numeric", month:"long", year:"numeric" }) : null;
    const registrantName = r.registrant ? r.registrant.name : null;
    r.purchases = r.purchases || {};
    const ownedCount = PRODUCTS.filter(p => r.purchases[p.id]).length;

    html += `</div>

      <div class="cf-upsell">
        <div class="cf-upsell-title">${registrantName ? `Bentornato, ${registrantName}.` : "Il tuo account è pronto."}</div>
        <div class="cf-upsell-text">${ownedCount > 0 ? `Hai già ${ownedCount} kit sbloccati con questo profilo.` : "Da qui puoi sbloccare i kit costruiti su questo stesso profilo del tono."}</div>
        <button class="cf-btn cf-btn-primary" id="cf-goto-kits" style="width:100%;">Vai a \u00abI miei kit\u00bb →</button>
        <div class="cf-fine-print">${savedLabel ? `Profilo salvato il ${savedLabel}.` : ""}</div>
      </div>

      <div class="cf-restart-row">
        <button class="cf-restart" id="cf-restart-edit">Modifica questo profilo</button>
        <button class="cf-restart" id="cf-restart-new">Inizia un profilo nuovo</button>
      </div>
    </div>`;

    app.innerHTML = html;
    document.getElementById("cf-goto-kits").addEventListener("click", () => goToTab("kits"));
    document.getElementById("cf-restart-edit").addEventListener("click", () => {
      Object.assign(answers, a);
      phase = "quiz"; step = 0; renderQuestion();
    });
    document.getElementById("cf-restart-new").addEventListener("click", () => {
      if (!confirm("Il profilo salvato verrà sostituito alla prossima analisi completata. Continuare?")) return;
      Object.keys(answers).forEach(k => delete answers[k]);
      phase = "intro"; renderIntro();
    });
  }

  function renderKitsTab(){
    activeTab = "kits";
    renderTabBar();
    profileBar.innerHTML = "";
    corridor.innerHTML = "";
    setPageHeader("Corporate Fables", "I miei kit", "Ogni kit legge il profilo del tono già salvato: nessuna domanda da rifare.");

    const profiles = [
      { type:"azienda", label:"Azienda", profile: companyProfile },
      { type:"individuo", label:"Individuo", profile: individualProfile }
    ].filter(p => p.profile && p.profile.registered);

    let html = `<div class="cf-card">`;
    if (!profiles.length) {
      html += `<p class="cf-hint">Non hai ancora un profilo del tono registrato. Completa prima l'analisi nella scheda \u00abTono di voce\u00bb.</p>
        <div class="cf-nav" style="justify-content:flex-end;"><button class="cf-btn cf-btn-primary" id="cf-kits-goto-tono">Vai al tono di voce →</button></div>`;
    } else {
      profiles.forEach(({ type, label, profile }) => {
        profile.purchases = profile.purchases || {};
        html += `<div style="margin-bottom:26px;">
          <div class="cf-section-label">${label} · ${profile.answers.company_name} (${profile.archetype.name})</div>
          <div class="cf-sw-grid" style="grid-template-columns:1fr 1fr;" data-kits-for="${type}">`;
        PRODUCTS.forEach(p => {
          const owned = !!profile.purchases[p.id];
          html += `<div class="cf-product-tile-light${owned ? ' owned' : ''}" data-id="${p.id}" data-type="${type}">
            <div>${p.icon} ${p.name}</div>
            <div class="cf-product-status-light">${owned ? '✓ Posseduto' : 'Sblocca (demo)'}</div>
          </div>`;
        });
        html += `</div></div>`;
      });
      html += `<div class="cf-fine-print">Demo: cliccando su un kit ne simuli lo sblocco, senza un pagamento reale. Nella versione di produzione qui ci sarebbe un vero checkout, e i kit posseduti aprirebbero il rispettivo generatore.</div>`;
    }
    html += `</div>`;
    app.innerHTML = html;

    const gotoTono = document.getElementById("cf-kits-goto-tono");
    if (gotoTono) gotoTono.addEventListener("click", () => goToTab("tono"));

    document.querySelectorAll("[data-id][data-type]").forEach(tile => {
      tile.addEventListener("click", async () => {
        const id = tile.dataset.id;
        const type = tile.dataset.type;
        const profile = type === "individuo" ? individualProfile : companyProfile;
        profile.purchases = profile.purchases || {};
        profile.purchases[id] = !profile.purchases[id];
        await saveProfile(type, profile);
        if (type === "individuo") individualProfile = profile; else companyProfile = profile;
        renderKitsTab();
      });
    });
  }

  function renderDashboard(){
    activeTab = "dashboard";
    renderTabBar();
    profileBar.innerHTML = "";
    corridor.innerHTML = "";
    setPageHeader("Corporate Fables", "Dashboard", "Il riepilogo dei tuoi profili e dei tuoi kit.");

    const profiles = [
      { type:"azienda", icon:"🏰", label:"Azienda", profile: companyProfile },
      { type:"individuo", icon:"🦊", label:"Individuo", profile: individualProfile }
    ].filter(p => p.profile && p.profile.registered);

    let html = `<div class="cf-card">`;
    profiles.forEach(({ type, icon, label, profile }) => {
      const owned = PRODUCTS.filter(p => profile.purchases && profile.purchases[p.id]).length;
      html += `<div class="cf-archetype-card" style="margin-bottom:16px;cursor:pointer;" data-goto="${type}">
        <div class="cf-archetype-eyebrow">${icon} ${label} · ${profile.answers.company_name}</div>
        <h2 class="cf-archetype-name" style="font-size:22px;">${profile.archetype.name}</h2>
        <p class="cf-archetype-essence">Coerenza con l'obiettivo: <span class="cf-verdict-pill ${verdictPillClass(profile.goalFit.verdict)}">${verdictLabel(profile.goalFit.verdict)}</span></p>
        <p class="cf-archetype-essence" style="margin-top:8px;">${owned} kit sbloccati su ${PRODUCTS.length}</p>
      </div>`;
    });
    if (!profiles.length) {
      html += `<p class="cf-hint">Nessun profilo ancora. Comincia dalla scheda \u00abTono di voce\u00bb.</p>`;
    } else {
      html += `<div class="cf-nav" style="justify-content:center;"><button class="cf-btn cf-btn-ghost" id="cf-dash-goto-kits">Vai a tutti i kit →</button></div>`;
    }
    html += `</div>`;
    app.innerHTML = html;

    document.querySelectorAll("[data-goto]").forEach(card => {
      card.addEventListener("click", () => {
        currentEntityType = card.dataset.goto;
        currentProfile = currentEntityType === "individuo" ? individualProfile : companyProfile;
        renderResult(currentProfile);
      });
    });
    const dashKits = document.getElementById("cf-dash-goto-kits");
    if (dashKits) dashKits.addEventListener("click", () => goToTab("kits"));
  }

  function renderAccountTab(){
    activeTab = "account";
    renderTabBar();
    profileBar.innerHTML = "";
    corridor.innerHTML = "";
    setPageHeader("Corporate Fables", "Account", "I tuoi dati e le impostazioni sulla privacy.");

    const registrant = (individualProfile && individualProfile.registrant) || (companyProfile && companyProfile.registrant) || null;

    let html = `<div class="cf-card">`;
    if (registrant) {
      html += `<div class="cf-section">
        <div class="cf-section-label">I tuoi dati</div>
        <p class="cf-hint" style="font-size:14px;">Nome: <b>${registrant.name}</b><br/>Email: <b>${registrant.email}</b></p>
      </div>`;
    }
    html += `<div class="cf-section">
        <div class="cf-section-label">Privacy</div>
        <p class="cf-hint" style="font-size:13px;line-height:1.6;">I tuoi dati sono usati solo per salvare i profili del tono e comunicarti i kit sbloccati. Puoi richiederne la cancellazione in qualsiasi momento.</p>
        <div class="cf-nav" style="justify-content:flex-start;gap:12px;">
          <button class="cf-btn cf-btn-ghost" id="cf-delete-all">Cancella tutti i miei dati</button>
        </div>
      </div>
      <div class="cf-fine-print">Prototipo: i dati vivono nello storage del tuo account Claude. Nella versione di produzione risiederebbero in un database vostro (es. Supabase), con un vero login.</div>
    </div>`;
    app.innerHTML = html;

    document.getElementById("cf-delete-all").addEventListener("click", async () => {
      if (!confirm("Cancellare entrambi i profili e tutti i dati salvati? Non è recuperabile.")) return;
      await deleteProfile("azienda");
      await deleteProfile("individuo");
      companyProfile = null; individualProfile = null; currentProfile = null;
      Object.keys(answers).forEach(k => delete answers[k]);
      activeTab = "tono";
      renderHub();
    });
  }

  async function init(){
    companyProfile = await loadProfile("azienda");
    individualProfile = await loadProfile("individuo");
    if (anyRegistered()) {
      goToTab("dashboard");
    } else {
      renderHub();
    }
  }

  init();
})();
</script>
